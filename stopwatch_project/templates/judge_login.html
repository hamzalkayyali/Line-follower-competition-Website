{% extends 'base.html' %}
{% block title %}Judge Login{% endblock %}

{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
    <div style="background:var(--card-bg, #1e1e2e); padding:2.5rem; border-radius:12px; width:100%; max-width:360px; box-shadow:0 4px 24px rgba(0,0,0,0.3);">
        <h2 style="margin:0 0 0.5rem; text-align:center;">Judge Portal</h2>
        <p style="text-align:center; opacity:0.6; margin:0 0 1.5rem;">Enter your PIN to continue</p>

        {% if error %}
        <p style="color:#f87171; text-align:center; margin-bottom:1rem;">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input
                type="password"
                name="pin"
                placeholder="PIN"
                autofocus
                style="width:100%; padding:0.75rem 1rem; border-radius:8px; border:1px solid #333; background:#111; color:#fff; font-size:1.2rem; text-align:center; letter-spacing:0.3rem; box-sizing:border-box; margin-bottom:1rem;"
            >
            <button type="submit" style="width:100%; padding:0.75rem; border-radius:8px; border:none; background:#6366f1; color:#fff; font-size:1rem; cursor:pointer; font-weight:600;">
                Enter
            </button>
        </form>
    </div>
</div>
{% endblock %}
