{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IEEE Line Follower Robot Competition - Live Leaderboard, Display & Judge Portal">
    <title>{% block title %}Line Follower Robot Competition{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="brand-icon">LF</div>
            <div>
                <div class="brand-text">Line Follower Competition</div>
                <div class="brand-sub">IEEE &bull; Robotics 2026</div>
            </div>
        </div>
        <div class="navbar-links">
            <a href="{% url 'leaderboard' %}" class="{% block nav_leaderboard %}{% endblock %}">Leaderboard</a>
            <a href="{% url 'display' %}" class="{% block nav_display %}{% endblock %}">Display</a>
            <a href="{% url 'judge' %}" class="{% block nav_judge %}{% endblock %}">Judge Portal</a>
            <a href="{% url 'calibration_display' %}" class="{% block nav_calibration %}{% endblock %}">Calibration</a>
        </div>
    </nav>

    <!-- Toast notification container -->
    <div id="toast" class="toast"></div>

    {% block content %}{% endblock %}

    <script>
        // Global toast notification function
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            // Trigger reflow then show
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // Format time from seconds to MM:SS.ms
        function formatTime(seconds) {
            if (!seconds || seconds <= 0 || seconds >= 9999) return '—';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const ms = Math.round((seconds % 1) * 100);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
